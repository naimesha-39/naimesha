<!DOCTYPE html>
<html>
<head>
<title>Student Participation System</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #667eea, #764ba2);
  color: white;
  text-align: center;
}

.container {
  background: white;
  color: black;
  width: 420px;
  margin: 40px auto;
  padding: 20px;
  border-radius: 10px;
}

button {
  padding: 10px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 5px;
}

input, select {
  padding: 8px;
  margin: 5px;
  width: 80%;
}
</style>
</head>

<body>

<h1>📘 Student Participation System</h1>

<div class="container">

<select id="role" onchange="toggleEmail()">
  <option value="student">Student</option>
  <option value="faculty">Faculty</option>
</select>

<br>

<select id="class">
  <option value="CSE">CSE</option>
</select>

<br>

<select id="section">
  <option value="A">Section A</option>
  <option value="B">Section B</option>
</select>

<br>

<input type="text" id="roll" placeholder="Enter Roll Number">

<br>

<input type="email" id="email" placeholder="Faculty Email" style="display:none;">

<br>

<button onclick="login()">Login</button>

</div>

<div id="output"></div>

<script>

let subjects = ["DBMS","P&DS","MEFA","DTI","OS","FLAT"];

function toggleEmail(){
  let role = document.getElementById("role").value;
  document.getElementById("email").style.display =
    (role === "faculty") ? "block" : "none";
}

function login(){
  let role = document.getElementById("role").value;
  let cls = document.getElementById("class").value;
  let sec = document.getElementById("section").value;
  let roll = document.getElementById("roll").value;
  let email = document.getElementById("email").value;

  if(roll === ""){
    alert("Enter Roll Number");
    return;
  }

  if(role === "faculty" && email === ""){
    alert("Enter Email");
    return;
  }

  if(role === "student"){
    showStudent(cls, sec, roll);
  } else {
    showFaculty(cls, sec, roll, email);
  }
}

function showStudent(cls, sec, roll){
  let data = JSON.parse(localStorage.getItem("marks")) || {};

  let html = `<div class="container"><h3>Student Dashboard</h3>`;
  html += `Class: ${cls}-${sec}<br>Roll: ${roll}<br><br>`;

  subjects.forEach(sub=>{
    let m = data[cls]?.[sec]?.[roll]?.[sub]?.marks || 0;
    let p = data[cls]?.[sec]?.[roll]?.[sub]?.poll || "-";
    html += `${sub}: ${m} (${p})<br>`;
  });

  let total = data[cls]?.[sec]?.[roll]?.total || 0;
  html += `<br><b>Total: ${total}/100</b></div>`;

  document.getElementById("output").innerHTML = html;
}

function showFaculty(cls, sec, roll, email){

  let html = `<div class="container"><h3>Faculty Panel</h3>`;
  html += `Email: ${email}<br>Student: ${roll}<br><br>`;

  subjects.forEach(sub=>{
    html += `${sub}: <input type="number" id="${sub}"><br>
    <select id="${sub}_poll">
      <option>Excellent</option>
      <option>Very Good</option>
      <option>Good</option>
    </select><br><br>`;
  });

  html += `Total:<br><input type="number" id="total"><br><br>`;
  html += `<button onclick="save('${cls}','${sec}','${roll}')">Save</button>`;
  html += `</div>`;

  document.getElementById("output").innerHTML = html;
}

function save(cls, sec, roll){
  let data = JSON.parse(localStorage.getItem("marks")) || {};

  if(!data[cls]) data[cls]={};
  if(!data[cls][sec]) data[cls][sec]={};
  if(!data[cls][sec][roll]) data[cls][sec][roll]={};

  subjects.forEach(sub=>{
    let m = document.getElementById(sub).value;
    let p = document.getElementById(sub+"_poll").value;

    data[cls][sec][roll][sub] = {marks:m, poll:p};
  });

  data[cls][sec][roll].total =
    document.getElementById("total").value;

  localStorage.setItem("marks", JSON.stringify(data));

  alert("Saved!");
}

</script>

</body>
</html>
